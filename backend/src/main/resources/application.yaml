server:
  port: 9999
spring:
  application:
    name: yidajava
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/medical_device?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456

# MyBatis-Plus 配置
mybatis-plus:
  # 实体类扫描路径
  type-aliases-package: com.isoft.yidajava.entity
  # Mapper XML 文件位置
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    # 日志实现 - 开发环境可使用 STDOUT_LOGGING 查看 SQL 日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 驼峰命名转换
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 主键类型 - AUTO 自增
      id-type: AUTO
      # 逻辑删除字段名
      logic-delete-field: deleted
      # 逻辑删除值（未删除）
      logic-not-delete-value: 0
      # 逻辑删除值（已删除）
      logic-delete-value: 1
      # 字段策略
      insert-strategy: NOT_NULL
      update-strategy: NOT_NULL

jwt:
  secret: yidajava-secret-key-2026-medical-device-management-system
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "